# Fly.io app configuration for the FlowDesk backend.
# Secrets (SUPABASE_SERVICE_ROLE_KEY, DATABASE_URL, ...) are set with
# `flyctl secrets set`, never here.
app = "flowdesk-backend"
primary_region = "syd"  # Sydney, ap-southeast-2

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Apply DB migrations before the new version goes live.
  release_command = "alembic upgrade head"

[env]
  PORT = "8080"
  APP_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true          # NFR-08: redirect HTTP -> HTTPS
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  # Default handlers = ["tls", "http"]: Fly Proxy terminates TLS and only
  # negotiates TLS 1.2/1.3 (NFR-08 satisfied by the platform).

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
